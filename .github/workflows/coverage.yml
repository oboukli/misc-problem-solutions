name: Code coverage report

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "test/**"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "test/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  llvm_coverage:
    name: Build for code coverage profiling
    env:
      CONFIGURE_PRESET_NAME: clang-coverage
      BINARY_DIR: ${{ github.workspace }}/out/build/clang-coverage
      VCPKG_BINARY_SOURCES: clear;nuget,GitHubPackages,readwrite
    runs-on: ubuntu-26.04

    steps:
      - name: Retrieve the LLVM archive signature
        run: |-
          echo "Types: deb
          URIs: http://apt.llvm.org/resolute/
          Suites: llvm-toolchain-resolute-22
          Components: main
          Signed-By:
          $(wget --output-document \
          - https://apt.llvm.org/llvm-snapshot.gpg.key \
          | sed -e 's/^$/./' -e 's/^/ /')" \
          | sudo tee /etc/apt/sources.list.d/llvm-toolchain-resolute.sources \
          > /dev/null

      - name: Install tools
        run: >-
          sudo apt-get update

          sudo apt-get install
          clang-22
          clang-tools-22
          libc++-22
          libc++-22-dev
          libc++abi-22-dev
          lld-22
          llvm-22
          lld-22
          mono-complete

          sudo update-alternatives
          --install /usr/bin/cc cc /usr/bin/clang-22 100

          sudo update-alternatives
          --install /usr/bin/c++ c++ /usr/bin/clang++-22 100

          sudo update-alternatives
          --install /usr/bin/ld ld /usr/bin/lld-22 100

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Check out vcpkg
        uses: actions/checkout@v7
        with:
          repository: microsoft/vcpkg
          path: ${{ github.workspace }}/vcpkg
          persist-credentials: false

      - name: Bootstrap vcpkg
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Add NuGet sources
        env:
          FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        run: >-
          unset VCPKG_FORCE_SYSTEM_BINARIES

          NUGET="$(./vcpkg/vcpkg fetch nuget | tail -n 1)"

          mono "${NUGET}"
          sources add
          -source "${{ env.FEED_URL }}"
          -storepasswordincleartext
          -name 'GitHubPackages'
          -username "${{ github.repository_owner }}"
          -password "${{ secrets.GITHUB_TOKEN }}"

          mono "${NUGET}"
          setapikey "${{ secrets.GITHUB_TOKEN }}"
          -source "${{ env.FEED_URL }}"

      - name: Configure CMake
        run: >-
          cmake
          --preset '${{ env.CONFIGURE_PRESET_NAME }}'

      - name: Build
        run: >-
          cmake
          --build '${{ env.BINARY_DIR }}'
          --parallel

      - name: Run code coverage script
        env:
          LLVM_ROOT: /usr/lib/llvm-22
        run: >-
          bash ${{ github.workspace }}/ci/generate_coverage_report.sh

      - name: Upload code coverage artifact
        uses: actions/upload-artifact@v7
        with:
          compression-level: 8
          if-no-files-found: error
          name: ${{ format('coverage-report-html-{0}', github.run_id) }}
          overwrite: true
          path: ${{ github.workspace }}/out/coverage/report
          retention-days: 2
