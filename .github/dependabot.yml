version: 2

x-common-configuration: &common-configuration
  directory: "/"
  schedule:
    interval: weekly
  commit-message:
    prefix: "chore: "

updates:
  - package-ecosystem: devcontainers
    <<: *common-update

  - package-ecosystem: vcpkg
    <<: *common-update
